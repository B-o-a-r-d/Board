; PHP-FPM pool tuning for the Board app (overrides the base image default,
; which caps pm.max_children at 5 — too low for a Livewire UI that fires bursts
; of requests per interaction: channel auth, lazy components, follow-up updates).
[www]
user = www-data
group = www-data
listen = 9000

; Dynamic workers with headroom for interactive bursts. Sized conservatively for
; a shared host: ~12 workers × ~60 MB ≈ 0.7 GB peak. pm.max_requests recycles a
; worker after N requests to bound memory growth.
pm = dynamic
pm.max_children = 12
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Pass the container environment through to workers (DB, Redis, Reverb, …).
clear_env = no
catch_workers_output = yes
