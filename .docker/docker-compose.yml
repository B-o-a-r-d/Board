# Docker Compose stack — targets a Dokploy environment.
# Dokploy provides the reverse proxy (Traefik) and TLS termination; expose the
# `web` and `reverb` services to your domains from the Dokploy dashboard.

services:
  # Renamed from "app" for the same reason as the database: avoid the "app" alias
  # colliding with other Dokploy apps on the shared network (nginx → board-app:9000).
  board-app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: app
      args:
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-}
        VITE_REVERB_HOST: ${REVERB_HOST:-}
        VITE_REVERB_PORT: ${REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME:-https}
        # Bake in the optional Marketplace Power-Up when true (Dokploy → Environment).
        INSTALL_MARKETPLACE: ${INSTALL_MARKETPLACE:-false}
    image: board-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: app
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      board-postgres:
        condition: service_healthy
      board-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "php", "artisan", "db:show", "--quiet"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: web
      args:
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-}
        VITE_REVERB_HOST: ${REVERB_HOST:-}
        VITE_REVERB_PORT: ${REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME:-https}
        # Bake in the optional Marketplace Power-Up when true (Dokploy → Environment).
        INSTALL_MARKETPLACE: ${INSTALL_MARKETPLACE:-false}
    image: board-web:latest
    restart: unless-stopped
    depends_on:
      - board-app
    volumes:
      - storage-data:/var/www/html/storage:ro
    expose:
      - "80"
    # Traefik must be explicitly enabled on the container, otherwise Dokploy's
    # domain routers (injected from the "Domains" UI) never bind → 502.
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
    networks:
      - default
      - dokploy-network

  reverb:
    image: board-app:latest
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: reverb
      # Bind Reverb in plain HTTP on 8080; Dokploy/Traefik terminates TLS upstream.
      # Empty SSL paths prevent Reverb from falling back to config defaults and
      # attempting a TLS listener on 8080 (connection KO behind the proxy).
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
      REVERB_SSL_CERT: ""
      REVERB_SSL_KEY: ""
    command: ["sh", "-c", "php artisan config:clear && php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction"]
    depends_on:
      - board-app
    volumes:
      - storage-data:/var/www/html/storage
    expose:
      - "8080"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
    networks:
      - default
      - dokploy-network

  queue:
    image: board-app:latest
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: queue
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=1"]
    depends_on:
      - board-app
    volumes:
      - storage-data:/var/www/html/storage

  scheduler:
    image: board-app:latest
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: scheduler
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - board-app
    volumes:
      - storage-data:/var/www/html/storage

  # Renamed from "postgres" to a project-unique name: Dokploy attaches every service
  # to the shared "dokploy-network" where other apps also expose a "postgres" alias,
  # which would otherwise make the hostname "postgres" resolve to a foreign database.
  board-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-board}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-board}"]
      interval: 10s
      timeout: 5s
      retries: 5

  board-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  storage-data:

networks:
  # Project-private network (isolated per Dokploy project): app <-> postgres/redis/queue…
  # Keeping postgres & redis here (and NOT on dokploy-network) avoids any DNS collision
  # with a "postgres" service from another Dokploy app.
  default:
  # Shared Traefik network — ONLY web & reverb join it so Dokploy can route domains to them.
  dokploy-network:
    external: true
